basePath: /
definitions:
  internal_auth.DiscoveryPayload:
    properties:
      email:
        type: string
    type: object
  internal_auth.ErrorBody:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  internal_auth.MeResponse:
    properties:
      tenant_id:
        type: string
      user_id:
        type: string
    type: object
  internal_auth.RegistrationPayload:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      school_name:
        type: string
      session_ref:
        type: string
    type: object
  internal_auth.VerifyPayload:
    properties:
      token:
        type: string
    type: object
  internal_auth.VerifyResponse:
    properties:
      session_ref:
        type: string
    type: object
  internal_tenant.CreateTenantPayload:
    properties:
      name:
        type: string
      slug:
        type: string
    type: object
  internal_tenant.ErrorBody:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  internal_tenant.Tenant:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
host: localhost:3030
info:
  contact:
    name: Somotracker Team
  description: REST API for the Somotracker educational analytics platform.
  license:
    name: Proprietary
  title: Somotracker API
  version: 0.1.0
paths:
  /api/auth/callback:
    get:
      consumes:
      - application/json
      description: Stytch redirects users here after clicking a magic link. Verifies
        the token, caches the IST, and redirects to the frontend.
      parameters:
      - description: Stytch discovery magic link token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to frontend /register with session_ref
        "422":
          description: Invalid input
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Magic-link callback
      tags:
      - Auth
  /api/auth/discover:
    post:
      consumes:
      - application/json
      description: Sends a magic-link email to the given address to discover or create
        an organization.
      parameters:
      - description: Email address to send magic link to
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.DiscoveryPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Magic link sent
        "422":
          description: Invalid input
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Initiate magic-link discovery
      tags:
      - Auth
  /api/auth/me:
    get:
      consumes:
      - application/json
      description: Returns the authenticated user's ID and tenant ID from the session
        cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.MeResponse'
        "401":
          description: Session expired or missing
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Get current session
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a tenant (school), user, and session. Sets the session
        cookie on success.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RegistrationPayload'
      produces:
      - application/json
      responses:
        "204":
          description: Session cookie set; no content
        "401":
          description: Token expired or MFA required
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "409":
          description: Organization already exists
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "422":
          description: Invalid input
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Complete registration
      tags:
      - Auth
  /api/auth/session:
    delete:
      consumes:
      - application/json
      description: Destroys the current session and clears cookies.
      produces:
      - application/json
      responses:
        "204":
          description: Session destroyed; cookies cleared
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Logout
      tags:
      - Auth
  /api/auth/verify:
    post:
      consumes:
      - application/json
      description: Validates a magic-link discovery token and returns a session reference
        for the registration flow.
      parameters:
      - description: Magic link token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.VerifyPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.VerifyResponse'
        "401":
          description: Token expired
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "422":
          description: Invalid input
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_auth.ErrorBody'
      summary: Verify magic-link token
      tags:
      - Auth
  /tenants:
    post:
      consumes:
      - application/json
      description: Creates a new tenant (school) in the system.
      parameters:
      - description: Tenant details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_tenant.CreateTenantPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_tenant.Tenant'
        "422":
          description: Invalid input
          schema:
            $ref: '#/definitions/internal_tenant.ErrorBody'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_tenant.ErrorBody'
      summary: Create a tenant
      tags:
      - Tenants
swagger: "2.0"
tags:
- description: Authentication and session management endpoints
  name: Auth
- description: Tenant (school) management endpoints
  name: Tenants
